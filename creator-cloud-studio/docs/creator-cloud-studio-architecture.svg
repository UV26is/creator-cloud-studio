<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .cloud { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .lane { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
      .box-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
      .box-green { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; rx: 18; }
      .box-purple { fill: #faf5ff; stroke: #d8b4fe; stroke-width: 2; rx: 18; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .label { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #475569; }
      .tiny { font: 700 13px Arial, sans-serif; fill: #64748b; letter-spacing: .03em; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .state-ready { fill: #dcfce7; stroke: #22c55e; }
      .state-revision { fill: #fef3c7; stroke: #f59e0b; }
      .state-incomplete { fill: #fee2e2; stroke: #ef4444; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <text x="80" y="72" class="title">Creator Cloud Studio - Hybrid Cloud Architecture and Workflow</text>
  <text x="80" y="108" class="subtitle">Event poster submission with containers, S3-triggered serverless processing, DynamoDB state storage, and final user result.</text>

  <rect x="60" y="145" width="1480" height="755" rx="36" class="cloud"/>
  <image href="assets/aws-icons/aws-cloud.svg" x="92" y="168" width="44" height="44"/>
  <text x="148" y="197" class="label">AWS Cloud</text>

  <rect x="105" y="242" width="330" height="146" class="box"/>
  <text x="136" y="280" class="tiny">USER INPUT</text>
  <text x="136" y="314" class="label">Browser</text>
  <text x="136" y="344" class="small">Title, short description,</text>
  <text x="136" y="368" class="small">poster image file upload</text>

  <rect x="500" y="195" width="415" height="325" rx="24" class="lane"/>
  <image href="assets/aws-icons/amazon-ec2.svg" x="528" y="232" width="58" height="58"/>
  <text x="602" y="266" class="label">Amazon EC2</text>
  <text x="602" y="294" class="small">Docker containers</text>

  <rect x="535" y="326" width="340" height="70" class="box-blue"/>
  <text x="558" y="354" class="label">Presentation Service</text>
  <text x="558" y="379" class="small">Flask UI, /submit, /result polling</text>

  <rect x="535" y="424" width="340" height="70" class="box-blue"/>
  <text x="558" y="452" class="label">Workflow Service</text>
  <text x="558" y="477" class="small">Creates submission event in S3</text>

  <rect x="535" y="522" width="340" height="70" class="box-blue"/>
  <text x="558" y="550" class="label">Data Service</text>
  <text x="558" y="575" class="small">Stores and reads submission state</text>

  <rect x="1020" y="258" width="360" height="118" class="box-orange"/>
  <image href="assets/aws-icons/amazon-s3.svg" x="1046" y="285" width="58" height="58"/>
  <text x="1120" y="305" class="label">Amazon S3</text>
  <text x="1120" y="333" class="small">submissions/{id}.json</text>
  <text x="1120" y="357" class="small">posters/{id}/{filename}</text>

  <rect x="1020" y="440" width="360" height="390" class="box-purple"/>
  <image href="assets/aws-icons/aws-lambda.svg" x="1046" y="466" width="58" height="58"/>
  <text x="1120" y="490" class="label">AWS Lambda</text>
  <text x="1120" y="518" class="small">Serverless background processing</text>

  <rect x="1050" y="572" width="300" height="68" class="box"/>
  <text x="1072" y="600" class="label">Submission Event Function</text>
  <text x="1072" y="626" class="small">Triggered by S3 JSON upload</text>

  <rect x="1050" y="678" width="300" height="68" class="box"/>
  <text x="1072" y="706" class="label">Processing Function</text>
  <text x="1072" y="732" class="small">Applies required validation rules</text>

  <rect x="1050" y="784" width="300" height="68" class="box"/>
  <text x="1072" y="812" class="label">Result Update Function</text>
  <text x="1072" y="838" class="small">Writes final status and note</text>

  <rect x="505" y="665" width="410" height="130" class="box-green"/>
  <image href="assets/aws-icons/amazon-dynamodb.svg" x="535" y="699" width="58" height="58"/>
  <text x="610" y="719" class="label">Amazon DynamoDB</text>
  <text x="610" y="747" class="small">Table: submissions</text>
  <text x="610" y="771" class="small">id, title, description, filename, status, note</text>

  <path class="arrow" d="M 435 315 C 470 315, 486 361, 535 361"/>
  <text x="448" y="292" class="small">1. Submit form</text>

  <path class="arrow" d="M 705 396 L 705 424"/>
  <text x="720" y="414" class="small">2. Forward request</text>

  <path class="arrow" d="M 705 494 L 705 522"/>
  <text x="720" y="514" class="small">3. Create PENDING record</text>

  <path class="arrow" d="M 875 459 C 930 459, 960 317, 1020 317"/>
  <text x="918" y="392" class="small">4. Upload poster + event JSON</text>

  <path class="arrow" d="M 1050 818 C 990 818, 960 730, 915 730"/>
  <text x="925" y="792" class="small">8. Update status</text>

  <path class="dash" d="M 1200 376 L 1200 572"/>
  <text x="1218" y="450" class="small">5. S3 event</text>

  <path class="arrow" d="M 1200 640 L 1200 678"/>
  <text x="1218" y="666" class="small">6. Invoke</text>

  <path class="arrow" d="M 1200 746 L 1200 784"/>
  <text x="1218" y="772" class="small">7. Invoke</text>

  <path class="dash" d="M 535 557 C 420 557, 340 420, 270 388"/>
  <text x="302" y="501" class="small">9. Browser polls /result/{id}</text>

  <rect x="115" y="680" width="310" height="145" class="box"/>
  <text x="145" y="718" class="label">Final User Result</text>
  <text x="145" y="746" class="small">The UI shows one final status</text>
  <text x="145" y="770" class="small">plus a short explanatory note.</text>

  <rect x="145" y="794" width="74" height="30" rx="15" class="state-ready"/>
  <text x="159" y="814" class="tiny">READY</text>
  <rect x="230" y="794" width="132" height="30" rx="15" class="state-revision"/>
  <text x="245" y="814" class="tiny">NEEDS REVISION</text>
  <rect x="374" y="794" width="112" height="30" rx="15" class="state-incomplete"/>
  <text x="389" y="814" class="tiny">INCOMPLETE</text>

  <rect x="80" y="920" width="1440" height="42" rx="12" fill="#eef2f7" stroke="#cbd5e1"/>
  <text x="108" y="947" class="small">Validation rule order: missing required field -> INCOMPLETE; else short description or invalid filename extension -> NEEDS REVISION; else -> READY.</text>
</svg>
