<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Creator Cloud Studio hybrid cloud architecture and workflow</title>
  <desc id="desc">Paper-style architecture diagram showing browser input, EC2 container services, S3 event storage, Lambda processing, DynamoDB state, and the final result workflow.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .bg { fill: #fbfbfd; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #4b5563; letter-spacing: 0; }
      .caption { font: 400 14px Arial, Helvetica, sans-serif; fill: #374151; letter-spacing: 0; }
      .caption-strong { font: 700 14px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .group { fill: #ffffff; stroke: #c7ced8; stroke-width: 1.6; rx: 18; }
      .group-tint { fill: #f8fafc; stroke: #c7ced8; stroke-width: 1.6; rx: 18; }
      .module { fill: #ffffff; stroke: #aeb8c6; stroke-width: 1.5; rx: 10; }
      .module-blue { fill: #f7f9ff; stroke: #8fb3e8; stroke-width: 1.6; rx: 10; }
      .module-orange { fill: #fffaf4; stroke: #f0a45d; stroke-width: 1.6; rx: 10; }
      .module-purple { fill: #fbf7ff; stroke: #c196f0; stroke-width: 1.6; rx: 10; }
      .module-green { fill: #f7fff9; stroke: #72c99a; stroke-width: 1.6; rx: 10; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .small-label { font: 700 13px Arial, Helvetica, sans-serif; fill: #4b5563; letter-spacing: 0; }
      .body { font: 400 14px Arial, Helvetica, sans-serif; fill: #374151; letter-spacing: 0; }
      .body-strong { font: 700 14px Arial, Helvetica, sans-serif; fill: #1f2937; letter-spacing: 0; }
      .step { font: 700 13px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .arrow { stroke: #111827; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #4b5563; stroke-width: 1.6; fill: none; marker-end: url(#arrow-soft); }
      .arrow-dashed { stroke: #6b7280; stroke-width: 1.6; stroke-dasharray: 7 6; fill: none; marker-end: url(#arrow-soft); }
      .divider { stroke: #d7dde7; stroke-width: 1.2; }
      .badge-ready { fill: #ecfdf3; stroke: #57bd7f; stroke-width: 1.2; rx: 12; }
      .badge-revision { fill: #fff7ed; stroke: #f0a45d; stroke-width: 1.2; rx: 12; }
      .badge-incomplete { fill: #fff1f2; stroke: #ee7c7c; stroke-width: 1.2; rx: 12; }
      .badge-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #1f2937; letter-spacing: 0; }
      .icon-frame { fill: #ffffff; stroke: #d1d7e2; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="960"/>

  <text x="70" y="62" class="title">Creator Cloud Studio: Hybrid Cloud Submission Workflow</text>
  <text x="70" y="91" class="subtitle">Containerized front-end workflow on Amazon EC2, S3-triggered serverless validation, and DynamoDB-backed result state.</text>

  <rect x="58" y="122" width="1484" height="704" class="group-tint"/>
  <text x="94" y="162" class="label">AWS Cloud</text>
  <rect x="74" y="183" width="1448" height="622" fill="none" stroke="#e1e6ef" stroke-width="1.2" rx="12"/>

  <!-- Client -->
  <rect x="98" y="292" width="270" height="150" class="module"/>
  <text x="124" y="322" class="small-label">USER INPUT</text>
  <text x="124" y="354" class="label">Browser</text>
  <text x="124" y="386" class="body">Title, short description,</text>
  <text x="124" y="410" class="body">poster image file upload</text>
  <rect x="122" y="238" width="60" height="48" class="icon-frame"/>
  <path d="M138 258 L151 248 L164 258 L151 268 Z" fill="#111827"/>
  <path d="M151 249 L151 268" stroke="#ffffff" stroke-width="2"/>
  <text x="196" y="268" class="body-strong">User-facing submission page</text>

  <!-- EC2 container group -->
  <rect x="454" y="196" width="420" height="430" class="module-blue"/>
  <image href="assets/aws-icons/amazon-ec2.svg" x="486" y="224" width="56" height="56" preserveAspectRatio="xMidYMid meet"/>
  <text x="560" y="247" class="label">Amazon EC2</text>
  <text x="560" y="273" class="body">Docker container boundary</text>

  <rect x="496" y="326" width="336" height="72" class="module"/>
  <text x="526" y="354" class="label">Presentation Service</text>
  <text x="526" y="378" class="body">Flask UI, /submit endpoint, result polling</text>

  <rect x="496" y="440" width="336" height="72" class="module"/>
  <text x="526" y="468" class="label">Workflow Service</text>
  <text x="526" y="492" class="body">Creates submission event and uploads poster</text>

  <rect x="496" y="554" width="336" height="72" class="module"/>
  <text x="526" y="582" class="label">Data Service</text>
  <text x="526" y="606" class="body">Stores and reads submission state</text>

  <!-- Storage -->
  <rect x="982" y="228" width="342" height="144" class="module-orange"/>
  <image href="assets/aws-icons/amazon-s3.svg" x="1014" y="255" width="54" height="54" preserveAspectRatio="xMidYMid meet"/>
  <text x="1086" y="268" class="label">Amazon S3</text>
  <text x="1086" y="298" class="body">submissions/{id}.json</text>
  <text x="1086" y="322" class="body">posters/{id}/{filename}</text>

  <!-- Lambda processing -->
  <rect x="982" y="444" width="342" height="300" class="module-purple"/>
  <image href="assets/aws-icons/aws-lambda.svg" x="1014" y="470" width="54" height="54" preserveAspectRatio="xMidYMid meet"/>
  <text x="1086" y="485" class="label">AWS Lambda</text>
  <text x="1086" y="512" class="body">S3-triggered background checks</text>

  <rect x="1024" y="552" width="258" height="48" class="module"/>
  <text x="1048" y="582" class="body-strong">Submission Event Function</text>

  <rect x="1024" y="632" width="258" height="48" class="module"/>
  <text x="1048" y="662" class="body-strong">Processing Function</text>

  <rect x="1024" y="712" width="258" height="48" class="module"/>
  <text x="1048" y="742" class="body-strong">Result Update Function</text>

  <!-- State store -->
  <rect x="548" y="702" width="360" height="116" class="module-green"/>
  <image href="assets/aws-icons/amazon-dynamodb.svg" x="580" y="734" width="54" height="54" preserveAspectRatio="xMidYMid meet"/>
  <text x="650" y="746" class="label">Amazon DynamoDB</text>
  <text x="650" y="776" class="body">Table: submissions</text>
  <text x="650" y="800" class="body">id, title, filename, status, note</text>

  <!-- Result -->
  <rect x="104" y="620" width="296" height="142" class="module"/>
  <text x="130" y="652" class="label">Final User Result</text>
  <text x="130" y="684" class="body">The UI shows exactly one final</text>
  <text x="130" y="708" class="body">status with a short note.</text>
  <rect x="130" y="730" width="66" height="24" class="badge-ready"/>
  <text x="147" y="746" class="badge-text">READY</text>
  <rect x="207" y="730" width="126" height="24" class="badge-revision"/>
  <text x="220" y="746" class="badge-text">NEEDS REVISION</text>
  <rect x="344" y="730" width="98" height="24" class="badge-incomplete"/>
  <text x="356" y="746" class="badge-text">INCOMPLETE</text>

  <!-- Validation rule box -->
  <rect x="970" y="776" width="360" height="82" fill="#ffffff" stroke="#d1d7e2" stroke-width="1.4" rx="10"/>
  <text x="992" y="806" class="caption-strong">Validation order</text>
  <text x="992" y="832" class="caption">Missing required field -> INCOMPLETE; else</text>
  <text x="992" y="854" class="caption">short description or bad extension -> NEEDS REVISION; else READY.</text>

  <!-- Arrows and labels -->
  <path d="M368 366 C408 366 432 362 488 362" class="arrow"/>
  <text x="392" y="345" class="step">1. Submit form</text>

  <path d="M664 398 L664 432" class="arrow"/>
  <text x="686" y="422" class="step">2. Forward request</text>

  <path d="M664 512 L664 546" class="arrow"/>
  <text x="686" y="536" class="step">3. Create PENDING record</text>

  <path d="M832 476 C908 476 900 300 974 300" class="arrow"/>
  <text x="902" y="428" class="step">4. Upload event JSON + poster</text>

  <path d="M1153 372 L1153 544" class="arrow-dashed"/>
  <text x="1172" y="437" class="step">5. S3 object event</text>

  <path d="M1153 600 L1153 624" class="arrow-soft"/>
  <text x="1174" y="620" class="step">6. Invoke</text>

  <path d="M1153 680 L1153 704" class="arrow-soft"/>
  <text x="1174" y="700" class="step">7. Invoke</text>

  <path d="M1024 736 C948 736 948 760 916 760" class="arrow"/>
  <text x="920" y="724" class="step">8. Update final status</text>

  <path d="M548 760 C454 760 420 704 400 690" class="arrow-dashed"/>
  <text x="432" y="728" class="step">9. Poll result/{id}</text>

  <!-- Intra-service separator marks -->
  <line x1="514" y1="416" x2="814" y2="416" class="divider"/>
  <line x1="514" y1="530" x2="814" y2="530" class="divider"/>
  <line x1="1040" y1="616" x2="1266" y2="616" class="divider"/>
  <line x1="1040" y1="696" x2="1266" y2="696" class="divider"/>

  <text x="70" y="896" class="caption">
    <tspan class="caption-strong">Figure 1.</tspan>
    End-to-end hybrid-cloud workflow. The synchronous path accepts the form and creates initial state; the asynchronous path validates the uploaded submission and writes one final result.
  </text>
</svg>
